name: tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches:
      - '**'


jobs:
  run_unittest_tests:
    name: Unittest
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Explicit list of (python, django) combinations valid per Django's
      # support matrix:
      #   - 5.0  -> 3.11, 3.12
      #   - 5.1  -> 3.11, 3.12, 3.13
      #   - 5.2  -> 3.11, 3.12, 3.13   (LTS)
      #   - 6.0  -> 3.12, 3.13
      #   - main -> 3.12, 3.13
      matrix:
        include:
            - { os: ubuntu-24.04, python-version: "3.11", django-version: "5.0" }
            - { os: ubuntu-24.04, python-version: "3.12", django-version: "5.0" }
            - { os: ubuntu-24.04, python-version: "3.11", django-version: "5.1" }
            - { os: ubuntu-24.04, python-version: "3.12", django-version: "5.1" }
            - { os: ubuntu-24.04, python-version: "3.13", django-version: "5.1" }
            - { os: ubuntu-24.04, python-version: "3.11", django-version: "5.2" }
            - { os: ubuntu-24.04, python-version: "3.12", django-version: "5.2" }
            - { os: ubuntu-24.04, python-version: "3.13", django-version: "5.2" }
            - { os: ubuntu-24.04, python-version: "3.12", django-version: "6.0" }
            - { os: ubuntu-24.04, python-version: "3.13", django-version: "6.0" }
            - { os: ubuntu-24.04, python-version: "3.12", django-version: "main" }
            - { os: ubuntu-24.04, python-version: "3.13", django-version: "main" }

    steps:
      - uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          pip install --upgrade setuptools
          pip install tox

      - name: Run unittest Python ${{ matrix.python-version }} -- Django ${{ matrix.django-version }}
        env:
          TOXENV: py${{ matrix.python-version }}-django${{ matrix.django-version }}
          S3_TEST_ENDPOINT_URL: ${{ secrets.S3_TEST_ENDPOINT_URL }}
          S3_TEST_ACCESS_KEY: ${{ secrets.S3_TEST_ACCESS_KEY }}
          S3_TEST_SECRET_KEY: ${{ secrets.S3_TEST_SECRET_KEY }}
          S3_TEST_BUCKET_NAME: ${{ secrets.S3_TEST_BUCKET_NAME }}
          S3_TEST_BUCKET_NAME2: ${{ secrets.S3_TEST_BUCKET_NAME2 }}
          S3_TEST_ENDPOINT_URL3: ${{ secrets.S3_TEST_ENDPOINT_URL3 }}
          S3_TEST_ACCESS_KEY3: ${{ secrets.S3_TEST_ACCESS_KEY3 }}
          S3_TEST_SECRET_KEY3: ${{ secrets.S3_TEST_SECRET_KEY3 }}
          S3_TEST_BUCKET_NAME3: ${{ secrets.S3_TEST_BUCKET_NAME3 }}
        run: tox

  run_quality_tests:
    name: Quality tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          pip install tox

      - name: Quality tests
        env:
          TOXENV: ruff
        run: |
          tox
