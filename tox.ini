[tox]
minversion = 1.9
envlist =
	py{3.11,3.12}-django5.0
	py{3.11,3.12,3.13}-django5.1
	py{3.11,3.12,3.13}-django5.2
	py{3.12,3.13}-django6.0
	py{3.12,3.13}-djangomain
	ruff

[testenv]
setenv =
	PYTHONWARNINGS = always
	PYTHONDONTWRITEBYTECODE = 1
	# Use a non-existent file to prevent from loading
	# any configuration from the user's environment
	AWS_CONFIG_FILE = {toxinidir}/tests/no_such_file.conf
commands = pytest --cov=django_fsspec {posargs}
deps =
	django5.0: django~=5.0.0
	django5.1: django~=5.1.0
	django5.2: django~=5.2.0
	django6.0: django~=6.0.0
	djangomain: https://github.com/django/django/archive/main.tar.gz
	moto<5
	pytest
	pytest-cov
	python-dotenv
extras =
	s3

[testenv:ruff]
deps =
	ruff
commands =
	ruff check .
	ruff format --check .
skip_install = true

[pytest]
# Default test paths to run, if no other paths are specified on the CLI
# (specify paths after a -- e.g. `tox -- tests/test_s3.py`)
testpaths = tests/
